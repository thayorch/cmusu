services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi_backend
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    restart: always
    volumes:
      - ./backend:/app
    networks:
      - app_network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: vue_frontend
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app_network
    depends_on:
      - backend

networks:
  app_network:
    driver: bridge
